services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: midas-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - midas-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: midas-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - midas-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: midas-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
          --topic midas.transaction.events --partitions 3 --replication-factor 1
          --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
          --topic midas.transaction.events.dlq --partitions 1 --replication-factor 1
          --config retention.ms=2592000000 &&
        echo 'Kafka topics created.'
      "
    networks:
      - midas-network

  postgres:
    image: postgres:16-alpine
    container_name: midas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-midas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-midas_secret}
      POSTGRES_DB: midas_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-midas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - midas-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: midas-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: midas-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - midas-network

volumes:
  postgres_data:
    name: midas_postgres_data

networks:
  midas-network:
    name: midas-network
    driver: bridge
