server:
  port: ${RECONCILIATION_SERVICE_PORT:8083}

spring:
  application:
    name: reconciliation-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/midas_reconciliation
    username: ${POSTGRES_USER:midas}
    password: ${POSTGRES_PASSWORD:midas_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

kafka:
  topics:
    transaction-events: midas.transaction.events

reconciliation:
  job:
    fixed-delay-ms: 1800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.midas.reconciliation: DEBUG
