server:
  port: ${LEDGER_WORKER_PORT:8085}

spring:
  application:
    name: ledger-worker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/midas_ledger
    username: ${POSTGRES_USER:midas}
    password: ${POSTGRES_PASSWORD:midas_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

kafka:
  topics:
    transaction-events: midas.transaction.events

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.midas.ledger: DEBUG
