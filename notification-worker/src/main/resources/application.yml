server:
  port: ${NOTIFICATION_WORKER_PORT:8084}

spring:
  application:
    name: notification-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

kafka:
  topics:
    transaction-events: midas.transaction.events

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.midas.notification: DEBUG
